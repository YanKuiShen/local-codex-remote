<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Codex Remote</title>
  </head>
<body>
    <div id="root">
      <div id="bootstrap-hint" style="padding: 24px; color: #647084; font-size: 14px">
        正在加载 Codex Remote… 如果页面长时间不显示，请按 Ctrl+F5 清缓存重试，或确认已允许该站点运行脚本。
      </div>
    </div>
    <script>
      (function () {
        var hint = document.getElementById("bootstrap-hint");

        if (!hint || !(window instanceof Window)) {
          return;
        }

        if (window.location.protocol === "file:") {
          hint.textContent =
            "⚠️ 检测到 file:// 打开本地文件。请改用 http://localhost:5173/（本地开发）或你的服务器地址（例如 http://你的域名或IP/），否则脚本不会正常启动。";
        }
      })();
    </script>
    <script
      type="module"
      src="/src/main.tsx"
      onerror="document.getElementById('bootstrap-hint').textContent='⚠️ JS 入口脚本加载失败。请检查 dev server 是否启动、网络/防火墙、以及浏览器缓存。'"
    ></script>
  </body>
</html>
